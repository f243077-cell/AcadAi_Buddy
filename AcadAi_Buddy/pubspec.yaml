name: study_ai_app
description: AcadAI Buddy - Flutter Study Companion
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5

  # AI
  google_generative_ai: ^0.4.3

  # Routing
  go_router: ^14.6.3

  # UI & Markdown
  flutter_markdown: ^0.7.3

  # Functional Programming
  dartz: ^0.10.1

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0

  # Image
  image_picker: ^1.1.2

  # Environment
  flutter_dotenv: ^6.0.1

  # Dependency Injection
  get_it: ^7.7.0

  # Code Generation (if using freezed)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code Generation
  build_runner: ^2.4.12
  riverpod_generator: ^2.6.1
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - .env